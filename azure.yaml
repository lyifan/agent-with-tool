# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: ai-foundry-starter-basic
services:
    agent-with-tool:
        project: ./src
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            deployments:
                - model:
                    format: DeepSeek
                    name: DeepSeek-V4-Flash
                    version: "2026-04-23"
                  name: DeepSeek-V4-Flash
                  sku:
                    capacity: 20
                    name: GlobalStandard
        container:
            image: ${AZURE_CONTAINER_REGISTRY_ENDPOINT}/agent-with-tool-dev:latest
infra:
    provider: bicep
    path: ./infra
