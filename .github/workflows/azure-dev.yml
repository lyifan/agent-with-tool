# Run when commits are pushed to master
on:
  workflow_dispatch:
  push:
    # Run when commits are pushed to mainline branch (main or master)
    # Set this to the mainline branch you are using
    branches:
      - master

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read


jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ENABLE_HOSTED_AGENTS: ${{ vars.ENABLE_HOSTED_AGENTS }}
      ENABLE_MONITORING: ${{ vars.ENABLE_MONITORING }}
      AI_PROJECT_DEPENDENT_RESOURCES: ${{ vars.AI_PROJECT_DEPENDENT_RESOURCES }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_AI_DEPLOYMENTS_LOCATION: ${{ vars.AZURE_AI_DEPLOYMENTS_LOCATION }}
      AZURE_AI_PROJECT_NAME: ${{ vars.AZURE_AI_PROJECT_NAME }}
      AZURE_AI_PROJECT_ACR_CONNECTION_NAME: ${{ vars.AZURE_AI_PROJECT_ACR_CONNECTION_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AI_PROJECT_DEPLOYMENTS: ${{ vars.AI_PROJECT_DEPLOYMENTS }}
      ENABLE_CAPABILITY_HOST: ${{ vars.ENABLE_CAPABILITY_HOST }}
      USE_EXISTING_AI_PROJECT: ${{ vars.USE_EXISTING_AI_PROJECT }}
      AZURE_CONTAINER_REGISTRY_ENDPOINT: ${{ vars.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_AI_ACCOUNT_NAME: ${{ vars.AZURE_AI_ACCOUNT_NAME }}
      AI_PROJECT_CONNECTIONS: ${{ vars.AI_PROJECT_CONNECTIONS }}
      AZD_AGENT_SKIP_ACR: ${{ vars.AZD_AGENT_SKIP_ACR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install azd
        uses: Azure/setup-azd@v2
      - name: Install azure.ai.agents
        run:  azd extension install azure.ai.agents        
      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh


      - name: Provision Infrastructure
        run: azd provision --no-prompt

      - name: Deploy Application
        run: azd deploy --no-prompt
        
